<div class="shadow-panel">
  <div class="header">
    <h1>Shadow Hub 👻</h1>
    <div class="search-bar">
      <input type="text" placeholder="Buscar função...">
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active">Combate</button>
    <button class="tab-btn">Visual</button>
    <button class="tab-btn">Misc</button>
  </div>
  
  <div class="content">
    
    <div class="function-group">
      <h3>Combate Pró</h3>
      
      <div class="item">
        <div class="info">
          <span class="name">Aimbot Suave</span>
          <span class="desc">Trava suave na cabeça</span>
        </div>
        <label class="switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="item">
        <div class="info">
          <span class="name">Fov Circle</span>
          <span class="desc">Raio de alcance da mira</span>
        </div>
        <input type="range" min="0" max="360" value="90" class="range">
      </div>
      
      <div class="item">
        <div class="info">
          <span class="name">No Recoil</span>
          <span class="desc">Zero recuo da arma</span>
        </div>
        <label class="switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="status-bar">
      <span>Status: <b style="color: #00ff00;">Seguro</b></span>
      <span>Ping: 15ms</span>
    </div>

    <button class="btn-primary">INJETAR SHADOW V1</button>
  </div>

  <div class="footer">
    By Shadow | ScripterMax
  </div>
</div>
